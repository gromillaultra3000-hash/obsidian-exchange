name: CI
on: [push]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Syntax check core files
        run: |
          python3 -m py_compile relay-fastapi/main.py
          python3 -m py_compile relay/services/smart_router.py
          python3 -m py_compile relay/services/payment_service.py
      - name: Syntax check all Python sources
        run: |
          find relay relay-fastapi bot -name '*.py' -print0 | xargs -0 python3 -m py_compile
      - name: Route contract test (critical endpoints + webapp fetch mapping)
        run: python3 tests/test_routes.py
      - name: Landmine check (дефекты, выглядящие как рабочий код)
        run: python3 tests/test_landmines.py

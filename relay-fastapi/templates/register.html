{% extends "base.html" %}
{% block title %}Регистрация | ObsidianExchange{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>⚫ Регистрация</h1>
    <p class="sub">Создайте личный кабинет ObsidianExchange</p>
    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    <form method="post" action="/register">
        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" required value="{{ email or '' }}">
        </div>
        <div class="input-group">
            <label>Пароль</label>
            <input type="password" name="password" required minlength="8">
        </div>
        <div class="input-group">
            <label>Повторите пароль</label>
            <input type="password" name="password2" required minlength="8">
        </div>
        <button class="btn btn-primary btn-block" type="submit">Зарегистрироваться</button>
    </form>
    <p class="alt-link">Уже есть аккаунт? <a href="/login">Войти</a></p>
</div>
{% endblock %}

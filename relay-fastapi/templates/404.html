<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Страница не найдена | ObsidianExchange</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#050507;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e2e8f0;text-align:center;padding:24px}
.glow{position:fixed;top:20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(ellipse,rgba(124,58,237,.15) 0%,transparent 70%);pointer-events:none}
.card{position:relative;z-index:1;max-width:440px;width:100%}
.logo{font-size:22px;font-weight:700;color:#7c3aed;letter-spacing:.05em;margin-bottom:48px;display:block;text-decoration:none}
.logo span{opacity:.7;color:#a78bfa}
.code{font-size:96px;font-weight:900;line-height:1;background:linear-gradient(135deg,#7c3aed,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
h1{font-size:22px;font-weight:600;color:#e2e8f0;margin-bottom:12px}
p{font-size:15px;color:#94a3b8;line-height:1.6;margin-bottom:36px}
.btn{display:inline-block;background:#7c3aed;color:#fff;padding:13px 32px;border-radius:12px;text-decoration:none;font-weight:600;font-size:15px;transition:opacity .2s}
.btn:hover{opacity:.85}
.divider{width:48px;height:2px;background:linear-gradient(90deg,#7c3aed,#a855f7);margin:24px auto}
</style>
</head>
<body>
<div class="glow"></div>
<div class="card">
    <a href="/" class="logo">◆ Obsidian<span>Exchange</span></a>
    <div class="code">404</div>
    <div class="divider"></div>
    <h1>Страница не найдена</h1>
    <p>Возможно, ссылка устарела или страница была перемещена.<br>Вернитесь на главную и продолжите обмен.</p>
    <a href="/" class="btn">← На главную</a>
</div>
</body>
</html>
